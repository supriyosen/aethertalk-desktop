<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/app-icon.svg" />
    <link rel="apple-touch-icon" href="/app-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b75ff" />
    <title>AetherTalk</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      if (window.location.protocol === 'file:') {
        document.body.innerHTML = `
          <main style="min-height:100vh;display:grid;place-items:center;padding:24px;background:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
            <section style="width:min(100%,560px);padding:28px;border-radius:28px;background:rgba(255,255,255,0.96);box-shadow:0 20px 50px rgba(15,23,42,0.14);border:1px solid rgba(60,60,67,0.12);">
              <img src="./public/app-icon.svg" alt="AetherTalk icon" style="width:56px;height:56px;border-radius:18px;display:block;margin-bottom:18px;" />
              <p style="margin:0 0 8px;color:rgba(60,60,67,0.62);font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;">AetherTalk</p>
              <h1 style="margin:0;color:#111111;font-size:30px;line-height:1.1;">This app cannot open from <code style="font-size:0.9em;">index.html</code> directly.</h1>
              <p style="margin:14px 0 0;color:rgba(60,60,67,0.82);font-size:16px;line-height:1.55;">
                AetherTalk needs its local server running because the chat UI talks to the local Codex-powered backend and your saved chats on this device.
              </p>
              <div style="margin-top:18px;padding:16px 18px;border-radius:20px;background:#f7f9ff;border:1px solid rgba(11,117,255,0.12);">
                <p style="margin:0 0 8px;color:#0b75ff;font-size:14px;font-weight:700;">Use one of these instead:</p>
                <p style="margin:0;color:#3c3c43;font-size:15px;line-height:1.6;">1. Double-click <strong>Start AetherTalk.command</strong></p>
                <p style="margin:0;color:#3c3c43;font-size:15px;line-height:1.6;">2. Or run <code>npm run launch</code> in this folder</p>
                <p style="margin:0;color:#3c3c43;font-size:15px;line-height:1.6;">3. Then open <code>http://localhost:5173</code></p>
              </div>
            </section>
          </main>
        `
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
